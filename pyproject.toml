[tool.black]
line-length = 110
target-version = ["py311"]
extend-exclude = "migrations/"

[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["migrations"]

[tool.ruff.lint]
# E/F: pyflakes+pycodestyle errors, I: isort, UP: pyupgrade, B: bugbear, DJ: Django-specific checks
select = ["E", "F", "I", "UP", "B", "DJ"]
ignore = [
    "E501", # line length is enforced by black, not worth double-flagging
]

[tool.ruff.lint.isort]
known-first-party = ["config", "core", "dashboard", "telemetry"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["DJ"]
