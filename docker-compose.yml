services:
  postgres:
    image: debezium/postgres:16
    container_name: iot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_operational}
      POSTGRES_USER: ${POSTGRES_USER:-iot_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_app_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init_operational_schema.sql:/docker-entrypoint-initdb.d/init_operational_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot_app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: iot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: iot-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-connect:
    image: debezium/connect:2.7
    container_name: iot-kafka-connect
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: iot-connect-cluster
      CONFIG_STORAGE_TOPIC: iot_connect_configs
      OFFSET_STORAGE_TOPIC: iot_connect_offsets
      STATUS_STORAGE_TOPIC: iot_connect_statuses

volumes:
  postgres-data:
